name: Build VFO firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: generuj tag (raz, nie w matrix)
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.gen.outputs.new_tag }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: gen
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          LAST_TAG=$(git tag --list 'v*.*' --sort=-version:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            NEW_TAG="v1.01"
          else
            MAJOR=$(echo $LAST_TAG | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo $LAST_TAG | cut -d. -f2)
            NEW_MINOR=$(printf "%02d" $((10#$MINOR + 1)))
            NEW_TAG="v${MAJOR}.${NEW_MINOR}"
          fi
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $NEW_TAG"

  # Job 2: buduj oba firmware w matrix
  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [esp32_release, esp32_debug]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.platformio/packages
            ~/.platformio/cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: |
          pip install -U pip
          pip install platformio

      - name: Build firmware
        run: pio run -e ${{ matrix.env }}
        env:
          VERSION: ${{ needs.version.outputs.new_tag }}

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          for f in firmware.bin firmware.elf firmware.map; do
            src=".pio/build/${{ matrix.env }}/$f"
            dst="artifacts/${{ matrix.env }}-$f"
            [ -f "$src" ] && cp "$src" "$dst"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}
          path: artifacts/

  # Job 3: publikuj Release (po obu buildach)
  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: VFO ${{ needs.version.outputs.new_tag }}
          make_latest: true
          fail_on_unmatched_files: false
          body: |
            **ESP32 VFO** — automatyczny build
            Commit: `${{ github.sha }}`
          files: |
            all-artifacts/**/*.bin
            all-artifacts/**/*.elf
