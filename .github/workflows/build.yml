name: Build VFO firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy: 
      matrix: 
        env:
         - esp32_release
         - esp32_debug
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.platformio/packages
            ~/.platformio/cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: |
          pip install -U pip
          pip install platformio
          
      - name: Generate version tag
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          LAST_TAG=$(git tag --list 'v*.*' --sort=-version:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            NEW_TAG="v1.01"
          else
            MAJOR=$(echo $LAST_TAG | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo $LAST_TAG | cut -d. -f2)
            NEW_MINOR=$(printf "%02d" $((10#$MINOR + 1)))
            NEW_TAG="v${MAJOR}.${NEW_MINOR}"
          fi
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "Generated tag: $NEW_TAG"

      - name: Build firmware
        run: pio run -e ${{ matrix.env }}
        env:
          VERSION: ${{ env.NEW_TAG }}

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/${{ matrix.env }}
          cp .pio/build/${{ matrix.env }}/firmware.bin artifacts/${{ matrix.env }}/ || true 
          cp .pio/build/${{ matrix.env }}/firmware.elf artifacts/${{ matrix.env }}/ || true 
          cp .pio/build/${{ matrix.env }}/firmware.map artifacts/${{ matrix.env }}/ || true

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ env.NEW_TAG }}
          path: |
            .pio/build/**/firmware.bin
            .pio/build/**/*.elf

      - name: Create tag and Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: VFO ${{ env.NEW_TAG }}
          make_latest: true
          fail_on_unmatched_files: false
          body: |
            **ESP32 VFO** — automatyczny build
            Commit: `${{ github.sha }}`
          files: |
            .pio/build/**/firmware.bin
            .pio/build/**/*.elf